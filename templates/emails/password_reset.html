<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            color: #333;
        }
        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        h2 {
            color: #007BFF;
        }
        .temp-password {
            font-size: 18px;
            font-weight: bold;
            color: #d9534f;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #777;
        }
    </style>
    <title></title>
</head>
<body>
    <div class="container">
        <h2>Password Reset Request</h2>
        <p>Hello,</p>
        <p>You have requested a password reset. Your temporary password is:</p>
        <p class="temp-password">{{ temp_password }}</p>
        <p>Please log in and change your password immediately.</p>
        <p>Regards,</p>
        <p><strong>{{ SITE_NAME }} Team</strong></p>
        <div class="footer">
            <p>If you didn't request this, please ignore this email.</p>
        </div>
    </div>
</body>
</html>
