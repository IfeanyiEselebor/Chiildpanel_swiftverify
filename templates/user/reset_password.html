   <!-- [Head] end --><!-- [Body] Start -->
   <body data-pc-preset="{{ THEME_COLOUR }}" data-pc-sidebar-caption="{{ THEME_SIDEBAR_CAPTION }}" data-pc-layout="{{ THEME_LAYOUT }}" data-pc-direction="{{ THEME_LAYOUT_DIRECTION }}" data-pc-theme_contrast="{{ THEME_CONTRAST }}" data-pc-theme="{{ THEME_MODE }}">
      <!-- [ Pre-loader ] start -->
      <div class="loader-bg">
         <div class="loader-track">
            <div class="loader-fill"></div>
         </div>
      </div>
      <!-- [ Pre-loader ] End -->
      <div class="auth-main">
         <div class="auth-wrapper v1">
            <div class="auth-form">
               <div class="card my-5">
                  <div class="card-body">
                     <a href="#"><img src="{{ SITE_LOGO }}" class="mb-4 img-fluid" alt="img"></a>
                     <div class="d-flex justify-content-between align-items-end mb-4">
                        <h3 class="mb-0"><b>Forgot Password</b></h3>
                        <a href="/login" class="link-primary">Back to Login</a>
                     </div>
                     <form id="reset_password">
                         <div class="mb-3">
                             <label class="form-label">Email Address</label>
                             <input type="email" class="form-control" placeholder="Email Address"  name="email" id="email">
                         </div>
                     <p class="mt-4 text-sm text-muted">Do not forget to check SPAM box.</p>
                     <div class="d-grid mt-3"><button type="submit" id="forgot-btn" name="forgot" class="btn btn-primary">Send Password Reset Email</button></div>
                     </form>
                  </div>
               </div>
            </div>
         </div>
