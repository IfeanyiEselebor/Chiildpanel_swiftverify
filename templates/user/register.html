<!doctype html>
<html lang="en">
   <!-- [Head] start -->
   <head>
      <title>Register | {{ SITE_NAME }} </title>
      <!-- [Meta] -->
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=0,minimal-ui">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta name="description" content="Able Pro is trending dashboard template made using Bootstrap 5 design framework. Able Pro is available in Bootstrap, React, CodeIgniter, Angular,  and .net Technologies.">
      <meta name="keywords" content="Bootstrap admin template, Dashboard UI Kit, Dashboard Template, Backend Panel, react dashboard, angular dashboard">
      <meta name="author" content="CipherTech">
      <!-- [Favicon] icon -->
      <link rel="icon" href="{{ SITE_FAVICON }}" type="image/x-icon">
      <!-- [Font] Family -->
      <link rel="stylesheet" href="/static/assets/fonts/inter/inter.css" id="main-font-link">
      <!-- [phosphor Icons] https://phosphoricons.com/ -->
      <link rel="stylesheet" href="/static/assets/fonts/phosphor/duotone/style.css">
      <!-- [Tabler Icons] https://tablericons.com -->
      <link rel="stylesheet" href="/static/assets/fonts/tabler-icons.min.css">
      <!-- [Feather Icons] https://feathericons.com -->
      <link rel="stylesheet" href="/static/assets/fonts/feather.css">
      <!-- [Font Awesome Icons] https://fontawesome.com/icons -->
      <link rel="stylesheet" href="/static/assets/fonts/fontawesome.css">
      <!-- [Material Icons] https://fonts.google.com/icons -->
      <link rel="stylesheet" href="/static/assets/fonts/material.css">
      <!-- [Template CSS Files] -->
      <link rel="stylesheet" href="/static/assets/css/style.css" id="main-style-link">
      <script src="/static/assets/js/tech-stack.js"></script>
      <link rel="stylesheet" href="/static/assets/css/style-preset.css">
       <!-- Notyf CSS File -->
    <link rel="stylesheet" type="text/css" href="/static/assets/notyf/notyf.min.css">

    <!-- Notyf JS File -->
    <script src="/static/assets/notyf/notyf.min.js"></script>
   </head>
   <!-- [Head] end --><!-- [Body] Start -->
   <body data-pc-preset="{{ THEME_COLOUR }}" data-pc-sidebar-caption="{{ THEME_SIDEBAR_CAPTION }}" data-pc-layout="{{ THEME_LAYOUT }}" data-pc-direction="{{ THEME_LAYOUT_DIRECTION }}" data-pc-theme_contrast="{{ THEME_CONTRAST }}" data-pc-theme="{{ THEME_MODE }}">
      <!-- [ Pre-loader ] start -->
      <div class="loader-bg">
         <div class="loader-track">
            <div class="loader-fill"></div>
         </div>
      </div>
      <!-- [ Pre-loader ] End -->
      <div class="auth-main">
         <div class="auth-wrapper v1">
            <div class="auth-form">
               <div class="card my-5">
                  <div class="card-body">
                     <div class="text-center">
                        <a href="#"><img src="{{ SITE_LOGO }}" alt="img" style="max-width: 100%; max-height: 150px; height: auto; width: auto; object-fit: contain;"></a>
                     </div>
                     <form id="register_user">
                         <div class="row">
                        <div class="col-sm-12 mt-3">
                           <div class="mb-3"><input type="text" class="form-control" placeholder="Username" name="username" required></div>
                        </div>
                     </div>
                     <div class="mb-3"><input type="email" class="form-control" name="email" placeholder="E-mail" name="username" required></div>
                     <div class="mb-3"><input type="password" class="form-control" placeholder="Password" name="password" id="password" required></div>
                     <div class="mb-3"><input type="password" class="form-control" placeholder="Confirm Password" name="passwordConfirmation" id="passwordConfirmation" required></div>
                     <div class="d-flex mt-1 justify-content-between">
                        <div class="form-check"><input class="form-check-input input-primary" type="checkbox" id="tos"  required> <label class="form-check-label text-muted" for="customCheckc1">I agree to all the Terms & Condition</label></div>
                     </div>
                     <div class="d-grid mt-4"><button type="submit" name="register" id="register-btn" class="btn btn-primary">Sign up</button></div>
                     <div class="d-flex justify-content-between align-items-end mt-4">
                        <h6 class="f-w-500 mb-0">Already have an Account?</h6>
                        <a href="/login" class="link-primary">Login here</a>
                     </div>
                     </form>
                  </div>
               </div>
            </div>
         </div>
      </div>
      <!-- [ Main Content ] end --><!-- Required Js -->
      <script src="/static/assets/js/plugins/popper.min.js"></script>
      <script src="/static/assets/js/plugins/simplebar.min.js"></script>
      <script src="/static/assets/js/plugins/bootstrap.min.js"></script>
      <script src="/static/assets/js/icon/custom-font.js"></script>
      <script src="/static/assets/js/script.js"></script>
      <script src="/static/assets/js/theme.js"></script>
      <script src="/static/assets/js/multi-lang.js"></script>
      <script src="/static/assets/js/plugins/feather.min.js"></script>
   <script src="/static/assets/js/user/register.js"></script>
   </body>
   <!-- [Body] end -->
</html>
